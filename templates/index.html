<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinador Digital - Gov.br</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .card-header { border-radius: 15px 15px 0 0 !important; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Solicitar Assinatura</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form action="/enviar" method="POST" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="email" class="form-label font-weight-bold">E-mail do Destinatário</label>
                                <input type="email" name="email" id="email" class="form-control" placeholder="exemplo@gmail.com" required>
                                <div class="form-text">A pessoa receberá o documento e as instruções.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="documento" class="form-label font-weight-bold">Documento (PDF)</label>
                                <input type="file" name="documento" id="documento" class="form-control" accept=".pdf" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                🚀 Enviar Documento Agora
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-muted small text-center bg-white py-3">
                        Integrado ao fluxo do <strong>Portal Assinador ITI (gov.br)</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
